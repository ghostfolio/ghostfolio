<mat-tab-nav-panel #tabPanel class="flex-grow-1 overflow-auto">
  <router-outlet />
</mat-tab-nav-panel>

<nav
  mat-align-tabs="center"
  mat-tab-nav-bar
  [disablePagination]="true"
  [tabPanel]="tabPanel"
>
  @for (tab of tabs(); track tab) {
    @if (tab.showCondition !== false) {
      @if (tab.onClick) {
        <button
          class="no-min-width overflow-hidden px-2"
          mat-tab-link
          type="button"
          (click)="tab.onClick()"
        >
          <ng-container
            *ngTemplateOutlet="tabContent; context: { $implicit: tab }"
          />
        </button>
      } @else {
        <a
          #rla="routerLinkActive"
          class="no-min-width overflow-hidden px-2"
          mat-tab-link
          routerLinkActive
          [active]="rla.isActive"
          [routerLink]="tab.routerLink"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <ng-container
            *ngTemplateOutlet="tabContent; context: { $implicit: tab }"
          />
        </a>
      }
    }
  }
</nav>

<ng-template #tabContent let-tab>
  <ion-icon
    [name]="tab.iconName"
    [size]="deviceType === 'mobile' ? 'large' : 'small'"
  />
  <div class="d-none d-sm-block ml-1" [innerHTML]="tab.label"></div>
</ng-template>
