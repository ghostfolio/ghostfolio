<mat-tab-nav-panel #tabPanel class="flex-grow-1 overflow-auto">
  <router-outlet />
</mat-tab-nav-panel>

<nav
  mat-align-tabs="center"
  mat-tab-nav-bar
  [disablePagination]="true"
  [tabPanel]="tabPanel"
>
  @for (tab of tabs(); track tab) {
    @if (tab.showCondition !== false) {
      @if (tab.onClick) {
        <button
          class="no-min-width overflow-hidden px-2"
          mat-tab-link
          type="button"
          (click)="tab.onClick()"
        >
          <ng-container
            *ngTemplateOutlet="tabContent; context: { $implicit: tab }"
          />
          <ion-icon
            class="d-none d-sm-block external-link-icon ml-auto text-muted"
            name="open-outline"
          />
        </button>
      } @else {
        <a
          #rla="routerLinkActive"
          class="no-min-width overflow-hidden px-2"
          mat-tab-link
          routerLinkActive
          [active]="rla.isActive"
          [routerLink]="tab.routerLink"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <ng-container
            *ngTemplateOutlet="tabContent; context: { $implicit: tab }"
          />
        </a>
      }
    }
  }
</nav>

<ng-template #tabContent let-tab>
  <span class="align-items-center d-flex justify-content-start text-left w-100">
    <ion-icon
      class="flex-shrink-0"
      [name]="tab.iconName"
      [size]="deviceType === 'mobile' ? 'large' : 'small'"
    />
    <span
      class="d-none d-sm-block line-height-normal ml-1 overflow-hidden p-0 text-truncate"
      [innerHTML]="tab.label"
    ></span>
  </span>
</ng-template>
