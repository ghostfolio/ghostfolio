<h2 mat-dialog-title>
  @if (data.budget) {
    <ng-container i18n>Edit budget</ng-container>
  } @else {
    <ng-container i18n>Create budget</ng-container>
  }
</h2>

<form [formGroup]="budgetForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content class="budget-dialog-content">
    <mat-form-field appearance="outline">
      <mat-label i18n>Month</mat-label>
      <input formControlName="month" matInput type="month" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label i18n>Category</mat-label>
      <mat-select formControlName="categoryId">
        @if (isLoadingCategories) {
          <mat-option disabled i18n>Loading categories...</mat-option>
        } @else if (categories.length === 0) {
          <mat-option disabled i18n>No expense categories available</mat-option>
        } @else {
          @for (category of categories; track category.id) {
            <mat-option [value]="category.id">
              {{ category.name }}
            </mat-option>
          }
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label i18n>Amount</mat-label>
      <input
        formControlName="amount"
        matInput
        min="0.01"
        step="0.01"
        type="number"
      />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button i18n mat-button mat-dialog-close type="button">Cancel</button>
    <button
      color="primary"
      i18n
      mat-flat-button
      type="submit"
      [disabled]="budgetForm.invalid"
    >
      Save
    </button>
  </mat-dialog-actions>
</form>
